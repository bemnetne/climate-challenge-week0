name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

      # 3. Check Python version (required option)
      - name: Check Python version
        run: python --version

      # 4. Install dependencies (alternative / additional check)
      - name: Install dependencies
        run: pip install -r requirements.txt